<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Review Form</title>

    <meta name="description"
        content="Submit a product review form with ratings, useful features, installation date, and written feedback.">

    <meta name="author" content="Bulyaba Tracy">

    <meta name="theme-color" content="#4b004f">

    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/form.js" defer></script>
</head>

<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>

        <form method="get" action="review.html" class="review-form">

            <!-- Product Name -->
            <div class="form-group">

                <label for="productName">
                    Product Name <span class="required">*</span>
                </label>

                <select id="productName" name="productName" required>

                    <option value="" disabled selected>
                        Select a Product ...
                    </option>

                </select>

            </div>

            <!-- Overall Rating -->
            <fieldset class="rating-group">

                <legend>
                    Overall Rating <span class="required">*</span>
                </legend>

                <div class="stars">

                    <div class="star-option">
                        <label for="rating1">☆</label>
                        <input type="radio" id="rating1" name="rating" value="1" required>
                    </div>

                    <div class="star-option">
                        <label for="rating2">☆☆</label>
                        <input type="radio" id="rating2" name="rating" value="2" required>
                    </div>

                    <div class="star-option">
                        <label for="rating3">☆☆☆</label>
                        <input type="radio" id="rating3" name="rating" value="3" required>
                    </div>

                    <div class="star-option">
                        <label for="rating4">☆☆☆☆</label>
                        <input type="radio" id="rating4" name="rating" value="4" required>
                    </div>

                    <div class="star-option">
                        <label for="rating5">☆☆☆☆☆</label>
                        <input type="radio" id="rating5" name="rating" value="5" required>
                    </div>

                </div>

            </fieldset>

            <!-- Installation Date -->
            <div class="form-group">

                <label for="installDate">
                    Date of Installation <span class="required">*</span>
                </label>

                <input type="date" id="installDate" name="installDate" required>

            </div>

            <!-- Features -->
            <fieldset class="features-group">

                <legend>
                    Which features did you find useful in the product?
                    <em>(Check all that apply)</em>
                </legend>

                <div class="feature-item">
                    <input type="checkbox" id="durability" name="features" value="Durability">
                    <label for="durability">Durability</label>
                </div>

                <div class="feature-item">
                    <input type="checkbox" id="ease" name="features" value="Ease of Use">
                    <label for="ease">Ease of Use</label>
                </div>

                <div class="feature-item">
                    <input type="checkbox" id="performance" name="features" value="Performance">
                    <label for="performance">Performance</label>
                </div>

                <div class="feature-item">
                    <input type="checkbox" id="design" name="features" value="Design">
                    <label for="design">Design</label>
                </div>

            </fieldset>

            <!-- Written Review -->
            <div class="form-group">

                <label for="writtenReview">
                    Written Review
                </label>

                <textarea id="writtenReview" name="writtenReview" rows="6"></textarea>

            </div>

            <!-- User Name -->
            <div class="form-group">

                <label for="userName">
                    Your Name
                </label>

                <input type="text" id="userName" name="userName" autocomplete="name">

            </div>

            <!-- Submit -->
            <input type="submit" value="Post Review" class="submit-btn">

        </form>

    </main>

    <footer>
        <p>&copy;2026 🌸 Bulyaba Tracy 🌸 Uganda</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
