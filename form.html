<!-- form.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Review Form</title>

    <meta name="description" content="Product review form page">
    <meta name="author" content="Bulyaba Tracy">

    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/form.js" defer></script>
</head>

<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" class="review-form">

            <!-- Product Name -->
            <div class="form-group">
                <label for="productName">
                    Product Name <span class="required">*</span>
                </label>

                <select id="productName" name="productName" required>
                    <option value="" disabled selected>
                        Select a Product ...
                    </option>
                </select>
            </div>

            <!-- Overall Rating -->
            <fieldset class="rating-group">
                <legend>
                    Overall Rating <span class="required">*</span>
                </legend>

                <div class="stars">

                    <label for="rating1">
                        ☆
                        <input type="radio" id="rating1" name="rating" value="1" required>
                    </label>

                    <label for="rating2">
                        ☆☆
                        <input type="radio" id="rating2" name="rating" value="2">
                    </label>

                    <label for="rating3">
                        ☆☆☆
                        <input type="radio" id="rating3" name="rating" value="3">
                    </label>

                    <label for="rating4">
                        ☆☆☆☆
                        <input type="radio" id="rating4" name="rating" value="4">
                    </label>

                    <label for="rating5">
                        ☆☆☆☆☆
                        <input type="radio" id="rating5" name="rating" value="5">
                    </label>

                </div>
            </fieldset>

            <!-- Date -->
            <div class="form-group">
                <label for="installDate">
                    Date of Installation <span class="required">*</span>
                </label>

                <input type="date" id="installDate" name="installDate" required>
            </div>

            <!-- Features -->
            <fieldset class="features-group">
                <legend>
                    Which features did you find useful in the product?
                    <em>(Check all that apply)</em>
                </legend>

                <label>
                    <input type="checkbox" id="durability" name="features" value="Durability">
                    Durability
                </label>

                <label>
                    <input type="checkbox" id="ease" name="features" value="Ease of Use">
                    Ease of Use
                </label>

                <label>
                    <input type="checkbox" id="performance" name="features" value="Performance">
                    Performance
                </label>

                <label>
                    <input type="checkbox" id="design" name="features" value="Design">
                    Design
                </label>
            </fieldset>

            <!-- Written Review -->
            <div class="form-group">
                <label for="review">
                    Written Review
                </label>

                <textarea id="review" name="review" rows="6"></textarea>
            </div>

            <!-- Name -->
            <div class="form-group">
                <label for="username">
                    Your Name
                </label>

                <input type="text" id="username" name="username">
            </div>

            <!-- Submit -->
            <input type="submit" value="Post Review" class="submit-btn">

        </form>
    </main>

    <footer>
        <p>&copy;2026 🌸 Bulyaba Tracy 🌸 Uganda</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
